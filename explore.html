<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据探索 - Pandas Playground</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container navbar-container">
      <a href="index.html" class="navbar-logo">
        🐼 Pandas Playground
      </a>
      <ul class="navbar-menu">
        <li><a href="index.html">首页</a></li>
        <li><a href="learn.html">学习</a></li>
        <li><a href="challenges.html">挑战</a></li>
        <li><a href="explore.html">探索</a></li>
      </ul>
      <button class="theme-toggle" title="切换主题">🌙</button>
      <button class="navbar-toggle" title="菜单">☰</button>
    </div>
  </nav>

  <!-- 主内容 -->
  <div class="container">
    <h1>数据探索</h1>
    <p>上传你的 CSV 文件，自动生成数据分析报告和代码建议！</p>

    <!-- CSV 上传 -->
    <section class="explore-container">
      <div class="upload-area">
        <input type="file" id="csv-file" accept=".csv" style="display: none;">
        <div class="upload-icon">📁</div>
        <h3>上传 CSV 文件</h3>
        <p class="upload-text">点击或拖拽文件到此处</p>
        <button class="btn btn-primary">选择文件</button>
      </div>
    </section>

    <!-- 数据预览 -->
    <section class="data-preview">
      <h3>数据预览</h3>
      <p>上传文件后将显示数据预览</p>
    </section>

    <!-- 分析报告 -->
    <section class="analysis-report">
      <h3>分析报告</h3>
      <p>上传文件后将生成分析报告</p>
      <button class="btn btn-secondary" onclick="downloadAnalysisReport()" style="margin-top: 10px; display: none;">下载报告</button>
    </section>

    <!-- 代码建议 -->
    <section class="code-suggestions">
      <h3>代码建议</h3>
      <p>上传文件后将生成代码建议</p>
      <button class="btn btn-secondary" onclick="downloadCodeSuggestions()" style="margin-top: 10px; display: none;">下载代码</button>
    </section>
  </div>

  <!-- 页脚 -->
  <footer class="container" style="margin-top: 40px; padding: 20px 0; text-align: center; border-top: 1px solid #e5e7eb;">
    <p>&copy; 2026 Pandas Playground - 交互式学习平台</p>
  </footer>

  <!-- 脚本 -->
  <script src="js/main.js"></script>
  <script src="js/explore.js"></script>
</body>
</html>
