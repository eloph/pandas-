<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>挑战 - Pandas Playground</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container navbar-container">
      <a href="index.html" class="navbar-logo">
        <span class="panda-icon">🐼</span>
        <span>Pandas Playground</span>
      </a>
      <ul class="navbar-menu">
        <li><a href="index.html">首页</a></li>
        <li><a href="learn.html">学习</a></li>
        <li><a href="challenges.html">挑战</a></li>
        <li><a href="explore.html">探索</a></li>
      </ul>
      <button class="theme-toggle" title="切换主题">🌙</button>
      <button class="navbar-toggle" title="菜单">☰</button>
    </div>
  </nav>

  <!-- 学习统计 -->
  <div class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">🎯</div>
        <div class="stat-value" id="completed-count">0</div>
        <div class="stat-label">已完成</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🏆</div>
        <div class="stat-value">10</div>
        <div class="stat-label">总挑战数</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⭐</div>
        <div class="stat-value" id="total-points">0</div>
        <div class="stat-label">获得积分</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🏅</div>
        <div class="stat-value" id="badges-count">0</div>
        <div class="stat-label">获得徽章</div>
      </div>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="container" style="margin-top: 30px;">
    <!-- 难度筛选 -->
    <div style="display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap;">
      <button class="btn btn-primary" onclick="filterChallenges('all')" id="filter-all">全部</button>
      <button class="btn btn-outline" onclick="filterChallenges('easy')" id="filter-easy">🌱 初级</button>
      <button class="btn btn-outline" onclick="filterChallenges('medium')" id="filter-medium">🌟 中级</button>
      <button class="btn btn-outline" onclick="filterChallenges('hard')" id="filter-hard">🔥 高级</button>
    </div>

    <!-- 挑战列表 -->
    <div class="challenges-list" id="challenges-list"></div>

    <!-- 挑战详情模态框 -->
    <div id="challenge-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; overflow-y: auto;">
      <div id="modal-content" style="max-width: 1000px; margin: 50px auto; background: var(--dark-secondary); border-radius: 16px; padding: 30px; border: 2px solid var(--neon-cyan); max-height: 90vh; overflow-y: auto;">
      </div>
    </div>
  </div>

  <!-- 排行榜 -->
  <div class="container" style="margin-top: 60px;">
    <div class="card">
      <h2 style="color: var(--neon-yellow); margin-bottom: 20px;">🏆 挑战排行榜</h2>
      <div style="display: grid; gap: 10px;">
        <div style="display: grid; grid-template-columns: 50px 1fr 100px 100px; padding: 15px; background: var(--dark-tertiary); border-radius: 8px; font-weight: bold; border: 1px solid var(--neon-cyan);">
          <span>排名</span>
          <span>用户名</span>
          <span>完成数</span>
          <span>积分</span>
        </div>
        <div style="display: grid; grid-template-columns: 50px 1fr 100px 100px; padding: 15px; background: var(--dark-tertiary); border-radius: 8px; align-items: center;">
          <span style="font-size: 24px;">🥇</span>
          <span>数据大师</span>
          <span>10</span>
          <span>1000</span>
        </div>
        <div style="display: grid; grid-template-columns: 50px 1fr 100px 100px; padding: 15px; background: var(--dark-tertiary); border-radius: 8px; align-items: center;">
          <span style="font-size: 24px;">🥈</span>
          <span>分析达人</span>
          <span>8</span>
          <span>800</span>
        </div>
        <div style="display: grid; grid-template-columns: 50px 1fr 100px 100px; padding: 15px; background: var(--dark-tertiary); border-radius: 8px; align-items: center;">
          <span style="font-size: 24px;">🥉</span>
          <span>熊猫新手</span>
          <span>6</span>
          <span>600</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="container" style="margin-top: 60px; padding: 30px 0; text-align: center; border-top: 2px solid var(--neon-cyan);">
    <p style="color: var(--text-secondary);">
      © 2026 Pandas Playground - 交互式学习平台 | 
      <span style="color: var(--neon-pink);">🐼</span> 
      完成挑战赢取徽章和积分!
    </p>
  </footer>

  <!-- 脚本 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
  <script src="js/main.js"></script>
  <script src="js/challenges.js"></script>
  <script>
    // 挑战数据
    const challengesData = [
      {
        id: 'c1',
        title: '创建你的第一个 DataFrame',
        difficulty: 'easy',
        category: '基础',
        description: '创建一个包含学生信息的 DataFrame，包括姓名、年龄和成绩。',
        task: '请创建一个 DataFrame，包含以下数据：\n- 姓名：张三, 李四, 王五\n- 年龄：20, 21, 22\n- 成绩：85, 90, 88\n\n然后打印出这个 DataFrame。',
        hint: '使用 pd.DataFrame() 函数创建，传入一个字典作为数据。',
        solution: `import pandas as pd

data = {
    '姓名': ['张三', '李四', '王五'],
    '年龄': [20, 21, 22],
    '成绩': [85, 90, 88]
}

df = pd.DataFrame(data)
print(df)`,
        points: 10,
        badge: '🌱'
      },
      {
        id: 'c2',
        title: '数据筛选 - 找出高分学生',
        difficulty: 'easy',
        category: '筛选',
        description: '使用布尔索引筛选出成绩大于等于90的学生。',
        task: '基于上一个挑战的 DataFrame，筛选出成绩大于等于90的学生，并打印出来。',
        hint: '使用 df[df["成绩"] >= 90] 进行布尔索引筛选。',
        solution: `import pandas as pd

data = {
    '姓名': ['张三', '李四', '王五'],
    '年龄': [20, 21, 22],
    '成绩': [85, 90, 88]
}

df = pd.DataFrame(data)
high_scores = df[df["成绩"] >= 90]
print(high_scores)`,
        points: 15,
        badge: '🌱'
      },
      {
        id: 'c3',
        title: '数据排序 - 按成绩排序',
        difficulty: 'easy',
        category: '排序',
        description: '将学生数据按成绩从高到低排序。',
        task: '将学生 DataFrame 按成绩降序排列，并打印排序后的结果。',
        hint: '使用 df.sort_values("成绩", ascending=False) 进行排序。',
        solution: `import pandas as pd

data = {
    '姓名': ['张三', '李四', '王五'],
    '年龄': [20, 21, 22],
    '成绩': [85, 90, 88]
}

df = pd.DataFrame(data)
sorted_df = df.sort_values("成绩", ascending=False)
print(sorted_df)`,
        points: 15,
        badge: '🌱'
      },
      {
        id: 'c4',
        title: '新增计算列 - 计算总分',
        difficulty: 'medium',
        category: '数据处理',
        description: '为学生数据添加一个总分列。',
        task: '创建一个包含数学、语文、英语成绩的 DataFrame，然后新增一列"总分"来计算三科成绩之和。',
        hint: '使用 df["总分"] = df["数学"] + df["语文"] + df["英语"] 添加新列。',
        solution: `import pandas as pd

data = {
    '姓名': ['张三', '李四', '王五'],
    '数学': [95, 88, 92],
    '语文': [90, 85, 88],
    '英语': [88, 92, 90]
}

df = pd.DataFrame(data)
df["总分"] = df["数学"] + df["语文"] + df["英语"]
print(df)`,
        points: 20,
        badge: '🌟'
      },
      {
        id: 'c5',
        title: '分组聚合 - 计算平均分',
        difficulty: 'medium',
        category: '聚合',
        description: '按科目分组计算平均分。',
        task: '创建包含多个科目成绩的数据，然后按姓名分组计算每个学生的平均分。',
        hint: '使用 df.groupby("姓名").mean() 进行分组求平均。',
        solution: `import pandas as pd

data = {
    '姓名': ['张三', '李四', '张三', '李四'],
    '科目': ['数学', '数学', '语文', '语文'],
    '成绩': [95, 88, 90, 85]
}

df = pd.DataFrame(data)
avg_scores = df.groupby("姓名")["成绩"].mean()
print(avg_scores)`,
        points: 25,
        badge: '🌟'
      },
      {
        id: 'c6',
        title: '数据统计 - 基本描述统计',
        difficulty: 'easy',
        category: '统计',
        description: '生成销售数据的统计描述。',
        task: '创建一个包含销售额的 DataFrame，然后使用 describe() 方法查看基本统计信息。',
        hint: '使用 df.describe() 可以生成计数、均值、标准差，最小值、分位数和最大值。',
        solution: `import pandas as pd

data = {
    '产品': ['A', 'B', 'C', 'D'],
    '销售额': [1200, 1800, 1500, 2100]
}

df = pd.DataFrame(data)
print(df.describe())`,
        points: 10,
        badge: '🌱'
      },
      {
        id: 'c7',
        title: '数据合并 - 合并两个表',
        difficulty: 'medium',
        category: '合并',
        description: '使用 merge 合并两个相关的数据表。',
        task: '创建两个 DataFrame：一个是产品信息（产品名、价格），另一个是销售信息（产品名、销售额）。然后按产品名合并这两个表。',
        hint: '使用 pd.merge(df1, df2, on="产品名") 进行合并。',
        solution: `import pandas as pd

products = pd.DataFrame({
    '产品名': ['A', 'B', 'C'],
    '价格': [100, 200, 150]
})

sales = pd.DataFrame({
    '产品名': ['A', 'B', 'C'],
    '销售额': [1200, 1800, 1500]
})

merged = pd.merge(products, sales, on="产品名")
print(merged)`,
        points: 25,
        badge: '🌟'
      },
      {
        id: 'c8',
        title: '数据透视表 - 分析销售数据',
        difficulty: 'hard',
        category: '透视表',
        description: '创建数据透视表来分析销售数据。',
        task: '创建包含日期、产品、销售额的销售数据，然后创建透视表按产品和月份统计总销售额。',
        hint: '使用 pd.pivot_table() 创建透视表，指定 values、index、columns 和 aggfunc 参数。',
        solution: `import pandas as pd

data = {
    '月份': ['1月', '1月', '2月', '2月'],
    '产品': ['A', 'B', 'A', 'B'],
    '销售额': [1200, 1800, 1500, 2100]
}

df = pd.DataFrame(data)
pivot = pd.pivot_table(df, values='销售额', index='产品', columns='月份', aggfunc='sum')
print(pivot)`,
        points: 30,
        badge: '🔥'
      },
      {
        id: 'c9',
        title: '缺失值处理',
        difficulty: 'medium',
        category: '数据清洗',
        description: '处理数据中的缺失值。',
        task: '创建一个包含缺失值（NaN）的 DataFrame，然后分别用删除法和填充法处理缺失值。',
        hint: '使用 df.dropna() 删除缺失值行，使用 df.fillna(值) 填充缺失值。',
        solution: `import pandas as pd
import numpy as np

data = {
    '产品': ['A', 'B', 'C', 'D'],
    '销售额': [1200, np.nan, 1500, np.nan]
}

df = pd.DataFrame(data)
print("原始数据:")
print(df)
print("\\n删除缺失值后:")
print(df.dropna())
print("\\n填充为0后:")
print(df.fillna(0))`,
        points: 25,
        badge: '🌟'
      },
      {
        id: 'c10',
        title: '高级应用 - apply 函数',
        difficulty: 'hard',
        category: '高级',
        description: '使用 apply 函数处理数据。',
        task: '创建一个包含薪资的 DataFrame，然后使用 apply 函数计算每个员工的税后薪资（税率10%）。',
        hint: '使用 df["税后薪资"] = df["薪资"].apply(lambda x: x * 0.9) 或者定义一个函数后使用 apply。',
        solution: `import pandas as pd

data = {
    '姓名': ['张三', '李四', '王五'],
    '薪资': [10000, 8000, 12000]
}

df = pd.DataFrame(data)

def calculate_tax(salary):
    return salary * 0.9

df["税后薪资"] = df["薪资"].apply(calculate_tax)
print(df)`,
        points: 35,
        badge: '🔥'
      }
    ];

    let currentFilter = 'all';
    let challengeEditor = null;
    let currentChallenge = null;

    // 初始化挑战页面
    function initChallengesPage() {
      renderChallenges();
      loadProgress();
    }

    // 渲染挑战列表
    function renderChallenges() {
      const container = document.getElementById('challenges-list');
      const progress = JSON.parse(localStorage.getItem('pandasPlayground_challengeProgress') || '{}');
      
      let filteredChallenges = challengesData;
      if (currentFilter !== 'all') {
        filteredChallenges = challengesData.filter(c => c.difficulty === currentFilter);
      }
      
      container.innerHTML = filteredChallenges.map(challenge => {
        const isCompleted = progress[challenge.id]?.completed;
        const attempts = progress[challenge.id]?.attempts || 0;
        
        return `
          <div class="challenge-card ${isCompleted ? 'completed' : ''}" 
               onclick="openChallenge('${challenge.id}')">
            <div class="challenge-header">
              <span class="challenge-badge">${challenge.badge}</span>
              <span class="challenge-difficulty difficulty-${challenge.difficulty}">
                ${challenge.difficulty === 'easy' ? '🌱 初级' : challenge.difficulty === 'medium' ? '🌟 中级' : '🔥 高级'}
              </span>
            </div>
            <h3 class="challenge-title">${challenge.title}</h3>
            <p class="challenge-description">${challenge.description}</p>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
              <span>🏷️ ${challenge.category}</span>
              <span>⭐ ${challenge.points} 分</span>
            </div>
            ${isCompleted ? '<div style="color: var(--neon-green); margin-top: 10px;">✅ 已完成</div>' : ''}
            ${attempts > 0 && !isCompleted ? `<div style="color: var(--neon-orange); margin-top: 10px;">尝试次数: ${attempts}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    // 筛选挑战
    function filterChallenges(level) {
      currentFilter = level;
      
      document.querySelectorAll('[id^="filter-"]').forEach(btn => {
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-outline');
      });
      
      const activeBtn = document.getElementById(`filter-${level}`);
      if (activeBtn) {
        activeBtn.classList.remove('btn-outline');
        activeBtn.classList.add('btn-primary');
      }
      
      renderChallenges();
    }

    // 打开挑战
    function openChallenge(challengeId) {
      const challenge = challengesData.find(c => c.id === challengeId);
      if (!challenge) return;
      
      currentChallenge = challenge;
      
      const modal = document.getElementById('challenge-modal');
      const modalContent = document.getElementById('modal-content');
      modal.style.display = 'block';
      
      modalContent.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 20px;">
          <div>
            <span style="font-size: 32px;">${challenge.badge}</span>
            <span class="challenge-difficulty difficulty-${challenge.difficulty}" style="font-size: 14px; padding: 5px 15px; display: inline-block; margin-left: 10px;">
              ${challenge.difficulty === 'easy' ? '🌱 初级' : challenge.difficulty === 'medium' ? '🌟 中级' : '🔥 高级'}
            </span>
          </div>
          <button onclick="closeChallenge()" style="background: none; border: none; color: var(--text-primary); font-size: 32px; cursor: pointer;">✕</button>
        </div>
        
        <h2 style="color: var(--neon-cyan); margin-bottom: 10px;">${challenge.title}</h2>
        <p style="color: var(--text-secondary); margin-bottom: 20px;">${challenge.description}</p>
        
        <div class="card" style="background: var(--dark-tertiary);">
          <h3 style="color: var(--neon-yellow); margin-bottom: 15px;">📝 任务要求</h3>
          <pre style="white-space: pre-wrap; color: var(--text-primary); font-family: 'Fira Code', monospace;">${challenge.task}</pre>
        </div>
        
        <div style="margin: 20px 0;">
          <button class="btn btn-outline" onclick="showHint()" style="margin-right: 10px;">💡 提示</button>
          <button class="btn btn-outline" onclick="showSolution()">📋 查看答案</button>
        </div>
        
        <div id="hint-area" style="display: none; margin: 20px 0; padding: 15px; background: rgba(255, 255, 0, 0.1); border: 1px solid var(--neon-yellow); border-radius: 8px;">
          <strong style="color: var(--neon-yellow);">💡 提示：</strong>
          <span id="hint-text" style="color: var(--text-primary);">${challenge.hint}</span>
        </div>
        
        <div id="solution-area" style="display: none; margin: 20px 0;">
          <h4 style="color: var(--neon-green); margin-bottom: 10px;">📋 参考答案：</h4>
          <pre id="solution-code" style="background: var(--dark-bg); padding: 15px; border-radius: 8px; color: var(--neon-cyan); overflow-x: auto;">${challenge.solution}</pre>
        </div>
        
        <h3 style="color: var(--neon-purple); margin: 20px 0;">💻 代码编辑器</h3>
        <div id="challenge-editor"></div>
        
        <div style="display: flex; gap: 15px; margin-top: 20px;">
          <button class="btn btn-primary" onclick="runChallengeCode()">▶️ 运行代码</button>
          <button class="btn btn-secondary" onclick="verifyChallenge()">✅ 提交验证</button>
          <button class="btn btn-outline" onclick="closeChallenge()">关闭</button>
        </div>
        
        <div id="challenge-output" style="margin-top: 20px;"></div>
      `;
      
      setTimeout(() => {
        challengeEditor = CodeMirror(document.getElementById('challenge-editor'), {
          mode: 'python',
          theme: 'monokai',
          lineNumbers: true,
          indentUnit: 4,
          lineWrapping: true,
          height: '300px',
          value: `import pandas as pd

# 在这里编写你的代码

`
        });
      }, 100);
    }

    // 关闭挑战
    function closeChallenge() {
      document.getElementById('challenge-modal').style.display = 'none';
      currentChallenge = null;
    }

    // 显示提示
    function showHint() {
      const hintArea = document.getElementById('hint-area');
      hintArea.style.display = 'block';
    }

    // 显示答案
    function showSolution() {
      const solutionArea = document.getElementById('solution-area');
      solutionArea.style.display = 'block';
    }

    // 运行挑战代码
    async function runChallengeCode() {
      if (!challengeEditor) return;
      
      const code = challengeEditor.getValue();
      const outputElement = document.getElementById('challenge-output');
      
      outputElement.innerHTML = `
        <div style="padding: 20px; text-align: center;">
          <div style="font-size: 32px;">🐼</div>
          <p style="color: var(--neon-cyan);">正在运行代码...</p>
        </div>
      `;
      
      try {
        if (typeof loadPyodide !== 'undefined') {
          const pyodide = await loadPyodide();
          await pyodide.loadPackage(['pandas', 'numpy']);
          
          pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);
          
          await pyodide.runPythonAsync(code);
          const output = pyodide.runPython('sys.stdout.getvalue()');
          
          outputElement.innerHTML = `
            <div style="background: var(--dark-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--neon-cyan);">
              <h4 style="color: var(--neon-green); margin-bottom: 10px;">📤 执行结果：</h4>
              <pre style="color: var(--neon-cyan); white-space: pre-wrap;">${output || '代码执行完成'}</pre>
            </div>
          `;
        } else {
          outputElement.innerHTML = `
            <div style="background: var(--dark-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--neon-orange);">
              <p style="color: var(--neon-orange);">⚠️ Pyodide 未加载</p>
              <p style="color: var(--text-secondary);">请检查网络连接后重试。</p>
            </div>
          `;
        }
      } catch (error) {
        outputElement.innerHTML = `
          <div style="background: var(--dark-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--neon-pink);">
            <h4 style="color: var(--neon-pink); margin-bottom: 10px;">❌ 执行错误：</h4>
            <pre style="color: var(--neon-pink); white-space: pre-wrap;">${error.message}</pre>
          </div>
        `;
      }
    }

    // 验证挑战
    function verifyChallenge() {
      if (!currentChallenge || !challengeEditor) return;
      
      const userCode = challengeEditor.getValue();
      const progress = JSON.parse(localStorage.getItem('pandasPlayground_challengeProgress') || '{}');
      
      if (!progress[currentChallenge.id]) {
        progress[currentChallenge.id] = { attempts: 0, completed: false };
      }
      progress[currentChallenge.id].attempts++;
      
      const isCorrect = checkSolution(currentChallenge.solution, userCode);
      
      if (isCorrect) {
        progress[currentChallenge.id].completed = true;
        localStorage.setItem('pandasPlayground_challengeProgress', JSON.stringify(progress));
        
        const totalPoints = parseInt(localStorage.getItem('pandasPlayground_totalPoints') || '0');
        localStorage.setItem('pandasPlayground_totalPoints', (totalPoints + currentChallenge.points).toString());
        
        document.getElementById('challenge-output').innerHTML = `
          <div style="background: rgba(57, 255, 20, 0.1); padding: 30px; border-radius: 12px; border: 2px solid var(--neon-green); text-align: center;">
            <div style="font-size: 64px; margin-bottom: 20px;">🎉</div>
            <h2 style="color: var(--neon-green); margin-bottom: 10px;">🎊 挑战完成!</h2>
            <p style="color: var(--text-primary); margin-bottom: 10px;">恭喜你完成了这个挑战!</p>
            <p style="color: var(--neon-yellow); font-size: 24px;">⭐ +${currentChallenge.points} 分</p>
          </div>
        `;
        
        showConfetti();
        loadProgress();
        renderChallenges();
        
        setTimeout(() => {
          closeChallenge();
        }, 3000);
      } else {
        localStorage.setItem('pandasPlayground_challengeProgress', JSON.stringify(progress));
        
        document.getElementById('challenge-output').innerHTML = `
          <div style="background: rgba(255, 102, 0, 0.1); padding: 20px; border-radius: 8px; border: 1px solid var(--neon-orange);">
            <h4 style="color: var(--neon-orange); margin-bottom: 10px;">⚠️ 答案不正确</h4>
            <p style="color: var(--text-secondary);">请检查你的代码，确保包含正确的输出。</p>
            <p style="color: var(--text-secondary); margin-top: 10px;">尝试次数: ${progress[currentChallenge.id].attempts}</p>
          </div>
        `;
      }
    }

    // 简单验证解决方案
    function checkSolution(solution, userCode) {
      const keyFunctions = ['pd.DataFrame', 'print', 'df['];
      const hasKeyFunctions = keyFunctions.some(fn => userCode.includes(fn));
      const hasDataFrame = solution.includes('DataFrame') && userCode.includes('DataFrame');
      const hasPrint = solution.includes('print') && userCode.includes('print');
      
      return hasKeyFunctions && hasDataFrame && hasPrint;
    }

    // 加载进度
    function loadProgress() {
      const progress = JSON.parse(localStorage.getItem('pandasPlayground_challengeProgress') || '{}');
      const completedCount = Object.values(progress).filter(p => p.completed).length;
      const totalPoints = parseInt(localStorage.getItem('pandasPlayground_totalPoints') || '0');
      
      let badgesCount = 0;
      if (completedCount >= 1) badgesCount++;
      if (completedCount >= 5) badgesCount++;
      if (completedCount >= 10) badgesCount++;
      
      const completedEl = document.getElementById('completed-count');
      const pointsEl = document.getElementById('total-points');
      const badgesEl = document.getElementById('badges-count');
      
      if (completedEl) completedEl.textContent = completedCount;
      if (pointsEl) pointsEl.textContent = totalPoints;
      if (badgesEl) badgesEl.textContent = badgesCount;
    }

    // 显示彩带特效
    function showConfetti() {
      const colors = ['#ff0080', '#00ffff', '#ffff00', '#39ff14', '#bf00ff'];
      
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.style.cssText = `
            position: fixed;
            left: ${Math.random() * 100}%;
            top: -20px;
            width: ${Math.random() * 10 + 5}px;
            height: ${Math.random() * 10 + 5}px;
            background: ${colors[Math.floor(Math.random() * colors.length)]};
            border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
            pointer-events: none;
            z-index: 10000;
            animation: confettiFall ${Math.random() * 2 + 2}s ease-out forwards;
          `;
          
          document.body.appendChild(confetti);
          
          setTimeout(() => {
            if (confetti.parentNode) confetti.remove();
          }, 4000);
        }, Math.random() * 500);
      }
    }

    document.addEventListener('DOMContentLoaded', initChallengesPage);
    
    document.getElementById('challenge-modal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeChallenge();
      }
    });
  </script>
</body>
</html>
